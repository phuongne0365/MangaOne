<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${manga.title} + ' - Chi tiết'">Chi tiết truyện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">MangaOne</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/kho-truyen">Kho truyện</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row bg-white p-4 rounded shadow-sm">
            <div class="col-md-4 text-center">
               <img th:src="@{'/' + ${manga.image}}" class="img-fluid rounded shadow-sm" alt="Hình ảnh truyện" style="max-height: 450px; object-fit: contain;">
            </div>

            <div class="col-md-8">
                <h2 class="fw-bold text-dark" th:text="${manga.title}">Tên truyện</h2>
                <hr>
                <p><strong>Tác giả:</strong> <span th:text="${manga.author}">Tác giả</span></p>
                
                <p><strong>Thể loại:</strong> 
                    <span class="badge bg-primary" th:text="${manga.category != null ? manga.category.categoryName : 'Chưa cập nhật'}"></span>
                </p>
                
                <p><strong>Nhà xuất bản:</strong> 
                    <span class="badge bg-secondary" th:text="${manga.publisher != null ? manga.publisher.publisherName : 'Chưa cập nhật'}"></span>
                </p>
                
                <h3 class="text-danger fw-bold my-4" th:text="${#numbers.formatInteger(manga.price, 0, 'COMMA') + ' VNĐ'}">Giá</h3>
                
                <p><strong>Số lượng còn lại:</strong> <span th:text="${manga.stockQuantity}"></span> cuốn</p>

                <p class="text-muted mt-3" th:text="${manga.description}">Mô tả truyện...</p>

                <form th:action="@{/cart/add}" method="post" class="mt-4">
                    <input type="hidden" name="mangaId" th:value="${manga.id}" />
                    
                    <div class="mb-3 d-flex align-items-center">
                        <label for="quantity" class="form-label me-3 mb-0"><strong>Số lượng:</strong></label>
                        <input type="number" id="quantity" name="quantity" class="form-control w-25" value="1" min="1" th:max="${manga.stockQuantity}">
                    </div>

                    <button type="submit" class="btn btn-success btn-lg px-4">
                        Thêm vào giỏ hàng
                    </button>
                    <a href="/kho-truyen" class="btn btn-outline-secondary btn-lg ms-2">Quay lại</a>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Dự án MangaOne - Nhóm 11 HaUI</p>
    </footer>

</body>
</html>
