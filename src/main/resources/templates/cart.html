<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - MangaOne</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .cart-img { width: 80px; height: 110px; object-fit: cover; border-radius: 4px; }
        .quantity-input { width: 70px; text-align: center; }
        .section-title { border-left: 4px solid #0d6efd; padding-left: 12px; }
        .total-box { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    </style>
</head>
<body>

<!-- ======= NAVBAR (đơn giản) ======= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">📚 MangaOne</a>
        <div>
            <a th:href="@{/mangas}" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-shop"></i> Kho truyện
            </a>
            <a th:href="@{/cart}" class="btn btn-warning btn-sm">
                <i class="bi bi-cart3"></i> Giỏ hàng
            </a>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <h3 class="section-title mb-4">🛒 Giỏ hàng của bạn</h3>

    <!-- Thông báo thành công / lỗi -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ======= TRƯỜNG HỢP: GIỎ HÀNG TRỐNG ======= -->
    <div th:if="${cartItems == null or cartItems.empty}" class="text-center py-5">
        <i class="bi bi-cart-x" style="font-size: 5rem; color: #ccc;"></i>
        <p class="mt-3 text-muted fs-5">Giỏ hàng của bạn đang trống!</p>
        <a th:href="@{/mangas}" class="btn btn-primary mt-2">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
        </a>
    </div>

    <!-- ======= TRƯỜNG HỢP: CÓ SẢN PHẨM TRONG GIỎ ======= -->
    <div th:if="${cartItems != null and !cartItems.empty}" class="row g-4">

        <!-- CỘT TRÁI: Bảng danh sách sản phẩm -->
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Truyện</th>
                                <th class="text-center">Đơn giá</th>
                                <th class="text-center">Số lượng</th>
                                <th class="text-center">Thành tiền</th>
                                <th class="text-center">Xóa</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!--
                                th:each="item : ${cartItems}"
                                → Thymeleaf vòng lặp qua từng CartItem trong List
                                → Mỗi lần lặp, biến "item" đại diện cho 1 CartItem
                            -->
                            <tr th:each="item : ${cartItems}">

                                <!-- Ảnh bìa + Tên truyện -->
                                <td class="ps-3">
                                    <div class="d-flex align-items-center gap-3">
                                        <img th:src="@{'/' + ${item.manga.image}}"
                                             th:alt="${item.manga.title}"
                                             class="cart-img"
                                             onerror="this.src='/images/no-image.png'">
                                        <div>
                                            <p class="mb-1 fw-semibold" th:text="${item.manga.title}">Tên truyện</p>
                                            <small class="text-muted" th:text="${item.manga.author}">Tác giả</small>
                                        </div>
                                    </div>
                                </td>

                                <!-- Đơn giá -->
                                <td class="text-center">
                                    <span class="text-primary fw-bold"
                                          th:text="${#numbers.formatDecimal(item.manga.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                    </span>
                                </td>

                                <!-- Ô nhập số lượng + nút Cập nhật -->
                                <td class="text-center">
                                    <!--
                                        Form cập nhật số lượng.
                                        th:action → URL gửi POST request đến /cart/update
                                        th:value  → điền sẵn giá trị hiện tại vào ô input
                                    -->
                                    <form th:action="@{/cart/update}" method="post"
                                          class="d-flex align-items-center justify-content-center gap-1">
                                        <input type="hidden" name="cartId" th:value="${item.cartId}"/>
                                        <input type="number"
                                               name="quantity"
                                               class="form-control quantity-input"
                                               th:value="${item.quantity}"
                                               min="1" max="99"/>
                                        <button type="submit" class="btn btn-outline-secondary btn-sm"
                                                title="Cập nhật">
                                            <i class="bi bi-arrow-clockwise"></i>
                                        </button>
                                    </form>
                                </td>

                                <!-- Thành tiền (Đơn giá × Số lượng) -->
                                <td class="text-center">
                                    <span class="fw-bold text-danger"
                                          th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                    </span>
                                </td>

                                <!-- Nút Xóa -->
                                <td class="text-center">
                                    <!--
                                        th:action="@{/cart/remove/{id}(id=${item.cartId})}"
                                        → Thymeleaf tự điền cartId vào URL động
                                    -->
                                    <form th:action="@{/cart/remove/{id}(id=${item.cartId})}"
                                          method="post"
                                          onsubmit="return confirm('Xóa truyện này khỏi giỏ?')">
                                        <button type="submit" class="btn btn-outline-danger btn-sm">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </td>

                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Nút tiếp tục mua sắm -->
            <a th:href="@{/mangas}" class="btn btn-outline-secondary mt-3">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
        </div>

        <!-- CỘT PHẢI: Tổng tiền & Thanh toán -->
        <div class="col-lg-4">
            <div class="total-box p-4">
                <h5 class="fw-bold mb-3">📋 Tóm tắt đơn hàng</h5>
                <hr>

                <!-- Số lượng sản phẩm -->
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Số loại truyện:</span>
                    <!-- ${cartItems.size()} → đếm số phần tử trong List -->
                    <span th:text="${cartItems.size()} + ' cuốn'">0 cuốn</span>
                </div>

                <!-- Tạm tính -->
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Tạm tính:</span>
                    <span th:text="${#numbers.formatDecimal(tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    </span>
                </div>

                <!-- Phí ship -->
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Phí vận chuyển:</span>
                    <span class="text-success fw-bold">Miễn phí</span>
                </div>

                <hr>

                <!-- TỔNG CỘNG -->
                <div class="d-flex justify-content-between mb-3">
                    <strong class="fs-5">Tổng cộng:</strong>
                    <strong class="fs-5 text-danger"
                            th:text="${#numbers.formatDecimal(tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    </strong>
                </div>

                <!-- Nút Đặt hàng -->
                <a th:href="@{/checkout}" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-bag-check-fill me-2"></i>Tiến hành đặt hàng
                </a>
            </div>
        </div>

    </div><!-- end row -->
</div><!-- end container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
